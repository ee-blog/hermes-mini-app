<style>
/* ===== \u535a\u5ba2\u804a\u5929 Widget (\u7eaf\u9ed1\u6697\u6a21\u5f0f) ===== */
#eebk-chat-widget {
  --chat-primary: rgb(84, 155, 245);
  --chat-bg: rgb(34, 39, 46);
  --chat-text: rgb(201, 209, 217);
  --chat-border: rgba(255, 255, 255, 0.1);
  position: fixed;
  bottom: 80px;
  right: 20px;
  z-index: 9999;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

/* #chat-float-btn \u5df2\u7531\u9875\u9762 #unified-fab \u66ff\u4ee3 */

#chat-window {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 360px;
  max-width: calc(100vw - 40px);
  height: 480px;
  max-height: calc(100vh - 140px);
  background: var(--chat-bg);
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  display: none;
  flex-direction: column;
  overflow: hidden;
  border: 1px solid var(--chat-border);
}
#chat-window.open { display: flex; }

#chat-header {
  padding: 14px 16px;
  background: var(--chat-primary);
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
#chat-header-info { display: flex; align-items: center; gap: 10px; }
#chat-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
#chat-header-text h4 { margin: 0; font-size: 15px; }
#chat-header-text span { font-size: 12px; opacity: 0.85; }
#chat-close {
  background: rgba(255,255,255,0.15);
  border: none; color: white;
  cursor: pointer; padding: 6px 10px;
  border-radius: 6px; font-size: 18px; line-height: 1;
}
#chat-close:hover { background: rgba(255,255,255,0.25); }

#chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.msg { max-width: 82%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; word-break: break-word; }
.msg.user { align-self: flex-end; background: var(--chat-primary); color: white; border-bottom-right-radius: 4px; }
.msg.bot { align-self: flex-start; background: rgba(255,255,255,0.08); color: var(--chat-text); border-bottom-left-radius: 4px; }
.msg.error { align-self: flex-start; background: rgba(220,50,50,0.2); color: #ff6b6b; font-size: 13px; }
.msg.system { align-self: center; background: rgba(84,155,245,0.15); color: rgb(84,155,245); font-size: 13px; text-align: center; max-width: 95%; }

#chat-input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--chat-border);
  display: flex;
  gap: 10px;
  align-items: flex-end;
  background: var(--chat-bg);
}
#chat-input {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid var(--chat-border);
  border-radius: 22px;
  background: rgba(255,255,255,0.05);
  color: var(--chat-text);
  font-size: 14px;
  resize: none;
  max-height: 100px;
  outline: none;
  font-family: inherit;
}
#chat-input:focus { border-color: var(--chat-primary); }
#chat-send {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--chat-primary);
  border: none; color: white;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
#chat-send:hover { background: rgb(29, 111, 220); }
#chat-send:disabled { background: #ccc; cursor: not-allowed; }

/* \u6eda\u52a8\u6761\uff08\u6697\u8272\u98ce\u683c\uff09 */
#chat-messages::-webkit-scrollbar { width: 4px; }
#chat-messages::-webkit-scrollbar-track { background: transparent; }
#chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
#chat-messages::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }
#chat-input::-webkit-scrollbar { width: 4px; }
#chat-input::-webkit-scrollbar-track { background: transparent; }
#chat-input::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

.typing { display: flex; gap: 4px; padding: 4px 0; }
.typing span { width: 7px; height: 7px; border-radius: 50%; background: #999; animation: bounce 1.4s infinite ease-in-out; }
.typing span:nth-child(1) { animation-delay: -0.32s; }
.typing span:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }

/* \u624b\u673a\u7aef\uff1a\u5168\u5c4f\u6a21\u5f0f + iOS \u9632\u653e\u5927 */
@media (max-width: 480px) {
  #eebk-chat-widget { bottom: 0; right: 0; left: 0; }
  #chat-window {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    top: auto;
    width: 100vw; height: 75vh;
    max-width: 100vw; max-height: 75vh;
    border-radius: 16px 16px 0 0;
  }
  #chat-input { font-size: 16px; }
}
</style>

<div id="eebk-chat-widget">
  <div id="chat-window">
    <div id="chat-header">
      <div id="chat-header-info">
        <div id="chat-avatar">&#x1F916;</div>
        <div id="chat-header-text">
          <h4>&#x5955;&#x5955;&#x535A;&#x5BA2;&#x52A9;&#x624B; &#x5C0F;e</h4>
          <span>&#x7531;qwen3.5-4B&#x9A71;&#x52A8;</span>
        </div>
      </div>
      <button id="chat-close" onclick="toggleChat()">&#215;</button>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
      <textarea id="chat-input" rows="1" placeholder="&#x8F93;&#x5165;&#x6D88;&#x606F;..." maxlength="1000"></textarea>
      <button id="chat-send" onclick="sendMessage()">
        <svg width="18" height="18" viewbox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></path></svg>
      </button>
    </div>
  </div>
</div>

<script>
(function() {
  var API_URL = 'https://tg.eebk.com/v1/chat/completions';
  var NOTIFY_URL = 'https://tg.eebk.com/blog-notify';
  var MODEL = 'Qwen3.5-4B-Uncensored-HauhauCS-Aggressive-Q4_K_M.gguf';
  var SYSTEM_PROMPT = '\u4F60\u662F\u300C\u5955\u5955 Blog\u300D\u535A\u5BA2\u7684AI\u52A9\u624B\uFF0C\u540D\u4E3A\u300C\u5C0Fe\u300D\u3002\u56DE\u7B54\u7B80\u6D01\u4EB2\u5207\u3002\u5982\u679C\u4F60\u6709\u4EFB\u4F55\u95EE\u9898\uFF0C\u60F3\u8054\u7CFB\u535A\u4E3B\u53EF\u4EE5\u968F\u65F6\u544A\u8BC9\u6211\u54E6\uFF5E';

  var messages = [{role: 'system', content: SYSTEM_PROMPT}];
  var isLoading = false;
  var sessionId = localStorage.getItem('eebk_chat_sid') || ('chat_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6));
  localStorage.setItem('eebk_chat_sid', sessionId);
  var contactNotified = false;
  var visitorNotified = false;
  var humanMode = false;
  var pollTimer = null;

  var win = document.getElementById('chat-window');
  var messagesDiv = document.getElementById('chat-messages');
  var input = document.getElementById('chat-input');
  var sendBtn = document.getElementById('chat-send');

  function toggleChat() {
    if (!win || !win.classList) return;
    win.classList.toggle('open');
    if (win.classList.contains('open')) {
      if (messages.length === 1) {
        addMsg('bot', '\u4F60\u597D\uFF01\u6211\u662F\u535A\u5BA2\u52A9\u624B\u300C\u5C0Fe\u300D\uD83D\uDC4B \u6709\u4EC0\u4E48\u53EF\u4EE5\u5E2E\u52A9\u4F60\u7684\u5417\uFF1F\n\n\u5982\u679C\u4F60\u6709\u4EFB\u4F55\u95EE\u9898\uFF0C\u60F3\u8054\u7CFB\u535A\u4E3B\u53EF\u4EE5\u968F\u65F6\u544A\u8BC9\u6211\u54E6\uFF5E');
      }
    }
  }

  function addMsg(role, content) {
    var div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = content;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function addTyping() {
    var div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typing';
    div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function removeTyping() {
    var el = document.getElementById('typing');
    if (el) el.remove();
  }

function hasContactIntent(text) {
    var keywords = ['\u8054\u7CFB', '\u627E\u4F60', '\u535A\u4E3B', '\u5FAE\u4FE1', '\u90AE\u7BB1', '\u7535\u8BDD', 'TG', 'telegram', '\u5408\u4F5C', '\u5546\u52A1', '\u52A0\u4F60', '\u52A0\u597D\u53CB'];
    text = text.toLowerCase();
for (var i = 0; i < keywords.length; i++) {
      if (text.indexOf(keywords[i].toLowerCase()) !== -1) return true;
    }
    return false;
  }

  function notify(type, data) {
    var payload = {
      type: type,
      session_id: sessionId,
      url: window.location.href,
      page_title: document.title
    };
    for (var key in data) {
      payload[key] = data[key];
    }
    fetch(NOTIFY_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    }).catch(function() {});
  }

  function pollForHumanReply() {
    if (!humanMode) return;
    fetch(NOTIFY_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Accept': 'application/json'},
      body: JSON.stringify({type: 'get_human_reply', data: {session_id: sessionId}})
    }).then(function(r) { return r.json(); }).then(function(data) {
      if (data.reply) {
        addMsg('bot', data.reply);
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      }
    }).catch(function() {});
  }

  function sendMessage() {
    var text = input.value.trim();
    if (!text || isLoading) return;

    input.value = '';
    addMsg('user', text);

    if (!visitorNotified) {
      visitorNotified = true;
      notify('visitor_enter', {message: text});
    }

    if (humanMode) {
      isLoading = false;
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(pollForHumanReply, 3000);
      notify('visitor_forward', {message: text});
      return;
    }

    if (!contactNotified && hasContactIntent(text)) {
      contactNotified = true;
      humanMode = true;
      notify('contact_intent', {message: text, messages: messages.slice(-4)});
      addMsg('system', '\uD83D\uDCF1 \u5DF2\u901A\u77E5\u535A\u4E3B\uFF0C\u6709\u4E8B\u8BF7\u7A0D\u7B49\uFF5E');
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(pollForHumanReply, 3000);
      isLoading = false;
      sendBtn.disabled = false;
      return;
    }

    messages.push({role: 'user', content: text});
    isLoading = true;
    sendBtn.disabled = true;
    addTyping();

    var payload = {
      model: MODEL,
      messages: messages.slice(-10),
      stream: true,
      temperature: 0.7,
      max_tokens: 300
    };

    fetch(API_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    }).then(function(response) {
      if (response.status === 403) {
        removeTyping();
        addMsg('error', '\uD83D\uDEAB \u7528\u6237\u89E6\u53D1\u8FDD\u89C4\u884C\u4E3A\uFF0CIP\u5DF2\u88AB\u5C01\u7981');
        isLoading = false;
        sendBtn.disabled = true;
        return;
      }
      if (!response.ok) throw new Error('\u8BF7\u6C42\u5931\u8D25');
      removeTyping();

      var reader = response.body.getReader();
      var decoder = new TextDecoder();
      var fullResponse = '';
      var msgDiv = document.createElement('div');
      msgDiv.className = 'msg bot';
      messagesDiv.appendChild(msgDiv);
function read() {
        reader.read().then(function(result) {
          if (result.done) {
            if (fullResponse) {
              messages.push({role: 'assistant', content: fullResponse});
              notify('chat_message', {role: 'assistant', message: fullResponse});
            }
            isLoading = false;
            sendBtn.disabled = false;
            return;
          }
          var chunk = decoder.decode(result.value, {stream: true});
          var lines = chunk.split('\n');
          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            if (line.indexOf('data: ') === 0) {
              var data = line.slice(6);
              if (data === '[DONE]') continue;
              try {
                var json = JSON.parse(data);
                var delta = json.choices && json.choices[0] && json.choices[0].delta && json.choices[0].delta.content;
                if (delta) {
                  fullResponse += delta;
                  msgDiv.textContent = fullResponse;
messagesDiv.scrollTop = messagesDiv.scrollHeight;
                }
              } catch (e) {}
            }
          }
          read();
        }).catch(function(e) {
          removeTyping();
          addMsg('error', '\u51FA\u9519\u4E86: ' + e.message);
          isLoading = false;
          sendBtn.disabled = false;
        });
      }
      read();
    }).catch(function(error) {
      removeTyping();
      addMsg('error', '\u26A0\uFE0F ' + error.message);
      isLoading = false;
      sendBtn.disabled = false;
    });
  }

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  input.addEventListener('input', function() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 100) + 'px';
  });

  window.toggleChat = toggleChat;
  window.sendMessage = sendMessage;
})();

</script>
